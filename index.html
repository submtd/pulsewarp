<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PulseWarp - Mobile Rhythm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }

        .ui-overlay {
            position: absolute;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            color: white;
            z-index: 10;
        }

        .fever-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .overdrive-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ec4899, #a855f7);
            transition: width 0.1s linear, background 0.3s ease;
        }

        .overdrive-active {
            box-shadow: 0 0 20px #a855f7;
            animation: pulse 1s infinite;
        }

        .warp-active {
            box-shadow: 0 0 30px #22d3ee;
            animation: pulse 0.2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .modal {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }

        #shoutout-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            text-align: center;
            font-size: 4rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px #ec4899, 0 0 40px #ec4899;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
        }

        .shoutout-active {
            transform: translate(-50%, -50%) scale(1.2) !important;
            opacity: 1 !important;
        }

        .shoutout-fade {
            transform: translate(-50%, -50%) scale(2) !important;
            opacity: 0 !important;
        }

        @keyframes shatter-heart {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            20% {
                transform: scale(1.5);
                filter: brightness(1.5);
            }

            100% {
                transform: scale(0.5) translateY(100px) rotate(45deg);
                opacity: 0;
                filter: grayscale(1);
            }
        }

        .heart-shatter {
            display: inline-block;
            animation: shatter-heart 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center;
        }

        #life-loss-display {
            transition: all 0.3s ease-out;
            transform: scale(1);
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="ui-overlay" id="ui-layer">
            <div class="flex justify-between items-start">
                <div class="flex gap-8">
                    <div>
                        <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Score</h2>
                        <div id="score-display" class="text-3xl font-black text-white">00000</div>
                    </div>
                    <div>
                        <h2 class="text-xs font-bold uppercase tracking-widest text-cyan-400">Level</h2>
                        <div id="level-display"
                            class="text-3xl font-black text-cyan-500 drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]">1
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Streak</h2>
                    <div id="streak-display" class="text-4xl font-black text-cyan-500">0</div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-2 mb-10">
                <div id="feedback-text"
                    class="text-2xl font-black uppercase italic tracking-tighter scale-0 transition-transform duration-75">
                    Perfect!</div>
                <div class="fever-bar">
                    <div id="fever-fill" class="overdrive-progress"></div>
                </div>
                <div class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Pulse Core</div>
            </div>
        </div>

        <!-- The Shoutout Text Element -->
        <div id="shoutout-text">10 COMBO!</div>

        <!-- Center Screen Life Loss Animation Container -->
        <div id="life-loss-display"
            class="absolute top-[30%] left-0 w-full flex justify-center pointer-events-none z-40 opacity-0">
            <div id="hearts-container" class="flex gap-3 text-pink-500 drop-shadow-[0_0_15px_rgba(236,72,153,1)]">
            </div>
        </div>

        <canvas id="gameCanvas" class="z-0"></canvas>

        <!-- Start Screen with Animated Canvas Background -->
        <div id="menu"
            class="absolute inset-0 flex items-center justify-center z-20 overflow-hidden bg-slate-900 cursor-pointer"
            onclick="startGame()">
            <!-- Animated Splash Screen Canvas -->
            <canvas id="menuCanvas" class="absolute inset-0 w-full h-full object-cover z-0"></canvas>

            <div class="absolute bottom-16 w-full text-center pointer-events-none z-10">
                <p
                    class="text-white text-sm font-bold tracking-[0.4em] uppercase animate-pulse opacity-60 drop-shadow-lg">
                    Tap Anywhere to Start</p>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over" class="absolute inset-0 hidden items-center justify-center modal z-30 p-6 text-center">
            <div class="max-w-sm w-full">
                <h1 id="end-status" class="text-4xl font-black text-white mb-2">SESSION ENDED</h1>
                <p id="end-reason" class="text-slate-400 mb-6">The rhythm got the best of you.</p>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 backdrop-blur-md">
                        <div class="text-xs text-slate-500 uppercase font-bold">Best Streak</div>
                        <div id="final-streak" class="text-2xl font-black text-white">0</div>
                    </div>
                    <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 backdrop-blur-md">
                        <div class="text-xs text-slate-500 uppercase font-bold">Level Reached</div>
                        <div id="final-level" class="text-2xl font-black text-cyan-500">1</div>
                    </div>
                    <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 col-span-2 backdrop-blur-md">
                        <div class="text-xs text-slate-500 uppercase font-bold">Final Score</div>
                        <div id="final-score" class="text-5xl font-black text-white drop-shadow-md">0</div>
                    </div>
                </div>
                <button onclick="startGame()"
                    class="w-full py-4 bg-white text-slate-900 font-bold rounded-2xl shadow-xl transform transition active:scale-95 mb-3 text-lg">PLAY
                    AGAIN</button>
                <button onclick="location.reload()"
                    class="w-full py-2 text-slate-400 hover:text-white text-sm font-bold transition">MAIN MENU</button>
            </div>
        </div>
    </div>

    <script>
        // --- ANIMATED MENU BACKGROUND LOGIC ---
        const menuCanvas = document.getElementById('menuCanvas');
        const menuCtx = menuCanvas.getContext('2d');
        let menuAnimId;
        let menuTime = 0;

        // Persistent stars for the menu background
        const menuStars = Array.from({ length: 100 }, () => ({
            x: Math.random(),
            y: Math.random(),
            size: Math.random() * 2.5,
            speed: Math.random() * 0.5 + 0.2
        }));

        function resizeMenu() {
            menuCanvas.width = window.innerWidth;
            menuCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeMenu);
        resizeMenu();

        function drawMenu() {
            menuTime += 0.016;
            const cx = menuCanvas.width / 2;
            const cy = menuCanvas.height / 2;

            // 1. Deep Space Background
            const bgGrad = menuCtx.createLinearGradient(0, 0, 0, menuCanvas.height);
            bgGrad.addColorStop(0, '#020617');
            bgGrad.addColorStop(0.5, '#0f172a');
            bgGrad.addColorStop(1, '#1e1b4b');
            menuCtx.fillStyle = bgGrad;
            menuCtx.fillRect(0, 0, menuCanvas.width, menuCanvas.height);

            // 2. Drifting Stars
            menuCtx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            menuStars.forEach(star => {
                star.y += star.speed * 0.002;
                if (star.y > 1) {
                    star.y = 0;
                    star.x = Math.random();
                }
                menuCtx.beginPath();
                menuCtx.arc(star.x * menuCanvas.width, star.y * menuCanvas.height, star.size, 0, Math.PI * 2);
                menuCtx.fill();
            });

            // 3. Perspective Lanes (The Groove)
            const vpY = menuCanvas.height * 0.40;

            const trailGrad = menuCtx.createLinearGradient(0, vpY, 0, menuCanvas.height);
            trailGrad.addColorStop(0, 'rgba(168, 85, 247, 0)');
            trailGrad.addColorStop(1, 'rgba(168, 85, 247, 0.3)');
            menuCtx.fillStyle = trailGrad;
            menuCtx.beginPath();
            menuCtx.moveTo(cx - 30, vpY);
            menuCtx.lineTo(cx + 30, vpY);
            menuCtx.lineTo(cx + 300, menuCanvas.height);
            menuCtx.lineTo(cx - 300, menuCanvas.height);
            menuCtx.closePath();
            menuCtx.fill();

            menuCtx.strokeStyle = 'rgba(34, 211, 238, 0.4)';
            menuCtx.lineWidth = Math.max(2, menuCanvas.width * 0.005);
            for (let i = -3; i <= 3; i++) {
                menuCtx.beginPath();
                menuCtx.moveTo(cx + (i * 15), vpY);
                menuCtx.lineTo(cx + (i * 200), menuCanvas.height);
                menuCtx.stroke();
            }

            // Animated Horizontal Grid Lines
            menuCtx.strokeStyle = 'rgba(236, 72, 153, 0.3)';
            const gridSpeed = (menuTime * 60) % 20;
            for (let i = 1; i < 25; i++) {
                const gridOffset = i + (gridSpeed / 20);
                const y = vpY + Math.pow(gridOffset, 2.3) * (menuCanvas.height * 0.0012);
                if (y > menuCanvas.height) break;
                if (y < vpY) continue;
                menuCtx.beginPath();
                menuCtx.moveTo(0, y);
                menuCtx.lineTo(menuCanvas.width, y);
                menuCtx.lineWidth = gridOffset * 0.3;
                menuCtx.stroke();
            }

            // 4. Hovering Hyper-Diamond
            const dx = cx;
            const dy = menuCanvas.height * 0.60 + Math.sin(menuTime * 1.5) * 20;
            const dSize = Math.min(menuCanvas.width * 0.25, 120);

            menuCtx.shadowBlur = 60 + Math.sin(menuTime * 3) * 20;
            menuCtx.shadowColor = '#c084fc';

            menuCtx.fillStyle = '#a855f7';
            menuCtx.beginPath();
            menuCtx.moveTo(dx, dy - dSize);
            menuCtx.lineTo(dx + dSize, dy);
            menuCtx.lineTo(dx, dy + dSize);
            menuCtx.lineTo(dx - dSize, dy);
            menuCtx.closePath();
            menuCtx.fill();

            menuCtx.shadowBlur = 0;
            menuCtx.strokeStyle = '#ffffff';
            menuCtx.lineWidth = dSize * 0.12;
            menuCtx.lineJoin = 'miter';
            menuCtx.stroke();

            menuCtx.fillStyle = '#ffffff';
            menuCtx.shadowBlur = 30;
            menuCtx.shadowColor = '#ffffff';
            menuCtx.beginPath();
            menuCtx.moveTo(dx, dy - dSize * 0.4);
            menuCtx.lineTo(dx + dSize * 0.4, dy);
            menuCtx.lineTo(dx, dy + dSize * 0.4);
            menuCtx.lineTo(dx - dSize * 0.4, dy);
            menuCtx.closePath();
            menuCtx.fill();
            menuCtx.shadowBlur = 0;

            // 5. The Logo
            menuCtx.textAlign = 'center';
            menuCtx.textBaseline = 'middle';
            const fontSize = Math.min(menuCanvas.width * 0.18, 140);
            menuCtx.font = `italic 900 ${fontSize}px Inter, sans-serif`;

            const titleY = menuCanvas.height * 0.18;

            // "PULSE"
            menuCtx.fillStyle = '#ffffff';
            menuCtx.shadowBlur = 40;
            menuCtx.shadowColor = 'rgba(255,255,255,0.5)';
            menuCtx.fillText('PULSE', cx, titleY);

            // "WARP"
            menuCtx.fillStyle = '#22d3ee'; // Cyan
            menuCtx.shadowBlur = 60;
            menuCtx.shadowColor = '#22d3ee';
            menuCtx.fillText('WARP', cx, titleY + fontSize * 0.9);
            menuCtx.shadowBlur = 0; // reset

            menuAnimId = requestAnimationFrame(drawMenu);
        }

        // Ensure font loads completely before showing text accurately
        document.fonts.ready.then(function () {
            drawMenu();
        });


        // --- MAIN GAME LOGIC ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const streakEl = document.getElementById('streak-display');
        const levelEl = document.getElementById('level-display');
        const feverFill = document.getElementById('fever-fill');
        const feedbackText = document.getElementById('feedback-text');
        const shoutoutText = document.getElementById('shoutout-text');
        const menu = document.getElementById('menu');
        const gameOverScreen = document.getElementById('game-over');

        // Configuration
        let state = {
            score: 0,
            level: 1,
            streak: 0,
            maxStreak: 0,
            fever: 0,
            lives: 5,
            isFeverActive: false,
            feverMeasures: 0,
            isClearingForSpecial: false,
            isSpecialDropping: false,
            isSuperRushActive: false,
            superRushMeasures: 0,
            gameActive: false,
            lastFrame: 0,
            shake: 0,
            beatPulse: 0,
            difficulty: 1.0,
            totalMeasures: 0,
            notesSpawned: 0,
            nextBugAt: 0
        };

        const config = {
            targetY: 0,
            laneCount: 4,
            baseNoteSpeed: 300,
            baseSpawnRate: 1.0,
            perfectZone: 60, // Increased for mobile leniency
            hitRange: 140,   // Widened overall hit window
            measuresPerLevel: 16
        };

        let notes = [];
        let particles = [];
        let lanes = [];
        let lanePulses = [0, 0, 0, 0];
        let audioEngine = null;
        let spawnTimeout = null;

        function triggerShoutout(text, pitch = 1.0) {
            shoutoutText.innerText = text;
            shoutoutText.classList.remove('shoutout-fade');
            shoutoutText.classList.add('shoutout-active');

            setTimeout(() => {
                shoutoutText.classList.remove('shoutout-active');
                shoutoutText.classList.add('shoutout-fade');
            }, 1000);

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.pitch = pitch;
                utterance.rate = 1.3;
                utterance.volume = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }

        class AudioEngine {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.isPlaying = false;
                this.timerID = null;

                this.bpm = 120;
                this.bar = 0;
                this.nextNoteTime = this.ctx.currentTime + 0.1;
                this.step = 0;
                this.chords = [];
                this.bassType = 'square';
                this.leadType = 'sawtooth';
            }

            generateProceduralSong() {
                this.bpm = Math.floor(Math.random() * 41) + 100;
                this.evolveSong();
            }

            evolveSong() {
                const synthTypes = ['square', 'sawtooth', 'triangle'];
                const leadTypes = ['square', 'sawtooth', 'sine', 'triangle'];

                this.bassType = synthTypes[Math.floor(Math.random() * synthTypes.length)];
                this.leadType = leadTypes[Math.floor(Math.random() * leadTypes.length)];

                const baseFreq = 45 + Math.random() * 40;
                const getFreq = (semitones) => baseFreq * Math.pow(2, semitones / 12);

                const progressions = [
                    [0, 8, 3, 10],
                    [0, 5, 7, 0],
                    [0, 3, 7, 5],
                    [0, 8, 5, 7],
                    [0, 10, 8, 7],
                    [0, 0, 8, 10]
                ];

                const prog = progressions[Math.floor(Math.random() * progressions.length)];

                this.chords = prog.map(rootSemitone => {
                    const root = getFreq(rootSemitone);
                    const isMajor = [3, 8, 10].includes(rootSemitone);
                    const third = isMajor ? 4 : 3;

                    return {
                        root: root,
                        arp: [
                            root,
                            root * Math.pow(2, third / 12),
                            root * Math.pow(2, 7 / 12),
                            root * 2
                        ]
                    };
                });
            }

            start() {
                if (this.ctx.state === 'suspended') this.ctx.resume();

                if ('speechSynthesis' in window) {
                    let u = new SpeechSynthesisUtterance('');
                    u.volume = 0;
                    window.speechSynthesis.speak(u);
                }

                if (this.isPlaying) return;
                this.isPlaying = true;

                this.generateProceduralSong();

                this.nextNoteTime = this.ctx.currentTime + 0.1;
                this.step = 0;
                this.bar = 0;
                this.schedule();
            }

            stop() {
                this.isPlaying = false;
                cancelAnimationFrame(this.timerID);
            }

            playTone(freq, type, attack, decay, vol, slideFreq = null) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + attack + decay);

                gain.gain.setValueAtTime(0.001, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(vol, this.ctx.currentTime + attack);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + attack + decay);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + attack + decay);
            }

            playNoise(decay, vol, filterType = 'highpass', filterFreq = 5000) {
                const bufferSize = this.ctx.sampleRate * decay;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();

                filter.type = filterType;
                filter.frequency.value = filterFreq;

                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + decay);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start(this.ctx.currentTime);
            }

            schedule() {
                if (!this.isPlaying) return;
                while (this.nextNoteTime < this.ctx.currentTime + 0.1) {
                    this.playSequenceStep(this.step, state.level);

                    this.step++;
                    if (this.step >= 16) {
                        this.step = 0;
                        this.bar = (this.bar + 1) % 4;

                        if (state.gameActive) {
                            state.totalMeasures++;
                            if (state.totalMeasures >= state.level * config.measuresPerLevel) {
                                checkLevelUp();
                            }

                            if (state.isFeverActive && !state.isSpecialDropping) {
                                state.feverMeasures++;

                                if (state.feverMeasures === 7) {
                                    state.isClearingForSpecial = true;
                                }

                                if (state.feverMeasures >= 8) {
                                    state.isClearingForSpecial = false;
                                    state.isSpecialDropping = true;
                                    state.fever = 0;

                                    triggerShoutout("CATCH THIS!", 1.5);
                                    notes.push(new Note(false, true));
                                    updateUI();
                                } else {
                                    state.fever = 100 - (state.feverMeasures / 8) * 100;
                                    updateUI();
                                }
                            } else if (state.isSuperRushActive) {
                                state.superRushMeasures++;
                                if (state.superRushMeasures >= 4) {
                                    state.isSuperRushActive = false;
                                    state.fever = 0;
                                    feverFill.classList.remove('warp-active');

                                    notes.forEach(note => {
                                        for (let i = 0; i < 8; i++) particles.push(new Particle(note.x, note.y, note.color, true));
                                    });
                                    notes = [];
                                    updateUI();
                                } else {
                                    state.fever = 100 - (state.superRushMeasures / 4) * 100;
                                    updateUI();
                                }
                            }
                        }
                    }

                    let currentBpm = this.bpm + ((state.level - 1) * 10);
                    if (state.isFeverActive) currentBpm += 15;
                    if (state.isSuperRushActive) currentBpm *= 2.0;

                    this.nextNoteTime += (60 / currentBpm) / 4;
                }
                this.timerID = requestAnimationFrame(() => this.schedule());
            }

            playSequenceStep(step, level) {
                const chord = this.chords[this.bar];

                if (step % 4 === 0) {
                    this.playTone(120, 'sine', 0.01, 0.4, 0.6, 40);
                    if (state.gameActive) state.beatPulse = 1.0;
                }
                if (step % 4 === 0 || step === 10 || step === 14) {
                    this.playTone(chord.root, this.bassType, 0.02, 0.3, 0.15);
                }

                if (level >= 2) {
                    if (step % 8 === 4) {
                        this.playNoise(0.2, 0.4, 'bandpass', 2000);
                        this.playTone(200, 'triangle', 0.01, 0.2, 0.3, 100);
                    }
                    if (step % 2 !== 0) {
                        this.playNoise(0.05, 0.1, 'highpass', 8000);
                    }
                }

                if (level >= 3) {
                    const arpFreq = chord.arp[step % 4];
                    if (step % 2 === 0 || step % 3 === 0) {
                        this.playTone(arpFreq, this.leadType, 0.05, 0.15, 0.08);
                    }
                }

                if (level >= 4) {
                    this.playNoise(0.02, 0.05, 'highpass', 10000);
                    if ((state.isFeverActive || state.isSuperRushActive) && step === 0) {
                        this.playTone(chord.arp[3] * 2, 'sine', 0.5, 1.5, 0.05);
                    }
                }
            }

            sfxHit(perfect) {
                if (perfect) {
                    this.playTone(880, 'sine', 0.01, 0.1, 0.2);
                    this.playTone(1318.5, 'sine', 0.01, 0.2, 0.15);
                } else {
                    this.playTone(440, 'triangle', 0.01, 0.1, 0.2);
                }
            }
            sfxMiss() {
                this.playTone(200, 'sawtooth', 0.05, 0.4, 0.3, 50);
            }
            sfxLifeLost() {
                this.playTone(150, 'sawtooth', 0.05, 0.6, 0.5, 20);
                this.playNoise(0.6, 0.6, 'lowpass', 500);
            }
            sfxExplosion() {
                this.playNoise(0.6, 0.8, 'lowpass', 600);
                this.playTone(150, 'sawtooth', 0.05, 0.5, 0.5, 10);
            }
            sfxGameOver() {
                this.playTone(200, 'sawtooth', 0.1, 2.0, 0.5, 30);
                this.playTone(150, 'square', 0.1, 2.0, 0.5, 20);
                this.playNoise(2.0, 0.8, 'lowpass', 500);
            }
            sfxFever() {
                this.playTone(400, 'sine', 0.1, 1.0, 0.2, 1200);
            }
            sfxLevelUp() {
                this.playTone(440, 'sawtooth', 0.1, 0.2, 0.2, 880);
                setTimeout(() => this.playTone(554, 'sawtooth', 0.1, 0.2, 0.2, 1108), 100);
                setTimeout(() => this.playTone(659, 'sawtooth', 0.1, 0.4, 0.2, 1318), 200);
            }
        }

        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const renderWidth = Math.min(window.innerWidth * 0.9, 450);

            config.targetY = canvas.height - 120;
            const laneWidth = renderWidth / config.laneCount;

            const offsetX = (canvas.width - renderWidth) / 2;
            lanes = Array.from({ length: config.laneCount }, (_, i) => offsetX + (laneWidth * i) + (laneWidth / 2));
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, chaotic = false) {
                this.x = x;
                this.y = y;
                this.color = color;
                const speedMultiplier = chaotic ? 4 : 1;
                this.vx = (Math.random() - 0.5) * 20 * speedMultiplier;
                this.vy = (Math.random() - 0.5) * 20 * speedMultiplier;
                this.life = 1.0;
                this.size = (Math.random() * 6 + 2) * (chaotic ? 2 : 1);
            }
            update(dt) {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= dt * 2.5;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Note {
            constructor(isBug = false, isSpecial = false) {
                this.isBug = isBug;
                this.isSpecial = isSpecial;
                this.lane = Math.floor(Math.random() * config.laneCount);
                this.x = lanes[this.lane];
                this.y = -50;
                this.hit = false;
                this.size = 35;
                this.stretchX = 1;
                this.stretchY = 1;

                if (this.isBug) {
                    this.color = '#f0f';
                } else if (this.isSpecial) {
                    this.color = '#c084fc';
                    this.size = 45;
                } else {
                    const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];
                    this.color = (state.isFeverActive || state.isSuperRushActive) ? '#a855f7' : (colors[Math.min(state.level - 1, 3)] || '#ec4899');
                }
            }
            update(dt) {
                let speedMultiplier = 1 + ((state.level - 1) * 0.2);
                if (state.isFeverActive) speedMultiplier += 0.3;
                if (state.isSuperRushActive) speedMultiplier *= 10.0;
                if (this.isSpecial) speedMultiplier *= 2.0;

                this.y += config.baseNoteSpeed * speedMultiplier * dt;

                const dist = Math.abs(this.y - config.targetY);
                if (dist < 150 && !this.isBug && !this.isSpecial) {
                    this.stretchY = 1.3;
                    this.stretchX = 0.7;
                } else {
                    this.stretchY = 1;
                    this.stretchX = 1;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.stretchX, this.stretchY);

                ctx.shadowBlur = this.isSpecial ? 0 : 20;
                ctx.shadowColor = this.color;

                if (this.isBug) {
                    ctx.fillStyle = '#0ff';
                    ctx.fillRect(-this.size / 2 - 3, -this.size / 2 + 2, this.size, this.size);

                    ctx.fillStyle = '#f0f';
                    ctx.fillRect(-this.size / 2 + 3, -this.size / 2 - 2, this.size, this.size);

                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);

                    ctx.fillStyle = '#000';
                    const yOffset1 = (performance.now() / 20) % this.size;
                    const yOffset2 = (performance.now() / 30 + 10) % this.size;
                    ctx.fillRect(-this.size / 2, -this.size / 2 + yOffset1, this.size, 3);
                    ctx.fillRect(-this.size / 2, -this.size / 2 + yOffset2, this.size, 5);

                } else if (this.isSpecial) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size, 0);
                    ctx.lineTo(0, this.size);
                    ctx.lineTo(-this.size, 0);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 4;
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size / 2);
                    ctx.lineTo(this.size / 2, 0);
                    ctx.lineTo(0, this.size / 2);
                    ctx.lineTo(-this.size / 2, 0);
                    ctx.closePath();
                    ctx.fill();

                } else {
                    const grad = ctx.createLinearGradient(0, -this.size / 2, 0, this.size / 2);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.5, this.color);
                    grad.addColorStop(1, '#000000');

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(-this.size / 2 + 5, -this.size / 4, this.size - 10, this.size / 2, 8);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function spawnNote() {
            if (!state.gameActive) return;

            let spawnMultiplier = 1 + ((state.level - 1) * 0.15);
            if (state.isFeverActive) spawnMultiplier += 0.2;
            if (state.isSuperRushActive) spawnMultiplier *= 10.0;

            const delay = (1000 / (config.baseSpawnRate * spawnMultiplier));

            if (state.isClearingForSpecial || state.isSpecialDropping) {
                spawnTimeout = setTimeout(spawnNote, delay);
                return;
            }

            state.notesSpawned++;
            let isBug = false;
            if (state.notesSpawned >= state.nextBugAt) {
                isBug = true;
                state.nextBugAt = state.notesSpawned + Math.floor(Math.random() * 11) + 10;
            }

            if (state.isSuperRushActive && isBug) {
                isBug = false;
            }

            notes.push(new Note(isBug, false));

            spawnTimeout = setTimeout(spawnNote, delay);
        }

        function triggerHit(laneIndex) {
            if (!state.gameActive) return;

            let hitNote = null;
            let minTime = Infinity;

            notes.forEach((note, index) => {
                if (note.lane === laneIndex && !note.hit) {
                    const diff = Math.abs(note.y - config.targetY);
                    if (diff < config.hitRange && diff < minTime) {
                        minTime = diff;
                        hitNote = { note, index, diff };
                    }
                }
            });

            if (hitNote) {
                if (hitNote.note.isBug) {
                    processBugHit(hitNote.note, hitNote.index);
                } else if (hitNote.note.isSpecial) {
                    processSpecialHit(hitNote.note, hitNote.index);
                } else {
                    processHit(hitNote);
                }
            } else {
                if (!state.isSuperRushActive) {
                    processMistap();
                }
            }
        }

        function processMistap() {
            if (state.streak > 5) {
                state.shake = 15;
                showFeedback('MISS', '#ef4444');
                triggerShoutout("COMBO BROKEN", 0.5);
            } else {
                showFeedback('MISS', '#ef4444');
            }

            state.lives--;
            animateLifeLoss();
            state.shake = 20;

            if (state.isFeverActive) {
                state.isFeverActive = false;
                state.isClearingForSpecial = false;
                state.isSpecialDropping = false;
                feverFill.classList.remove('overdrive-active');
                triggerShoutout("PULSE BROKEN!", 0.5);
            }
            if (state.isSuperRushActive) {
                state.isSuperRushActive = false;
                feverFill.classList.remove('warp-active');
            }

            if (audioEngine) audioEngine.sfxLifeLost();
            state.streak = 0;
            state.fever = 0;
            updateUI();

            if (state.lives <= 0) endGame();
        }

        function processSpecialHit(note, index) {
            note.hit = true;
            for (let i = 0; i < 60; i++) particles.push(new Particle(note.x, note.y, '#22d3ee', true));
            notes.splice(index, 1);

            state.isFeverActive = false;
            state.isClearingForSpecial = false;
            state.isSpecialDropping = false;
            feverFill.classList.remove('overdrive-active');

            activateSuperRushMode();
        }

        function activateSuperRushMode() {
            state.isSuperRushActive = true;
            state.superRushMeasures = 0;
            state.fever = 100;
            state.shake = 60;

            if (audioEngine) audioEngine.sfxLevelUp();
            triggerShoutout("WARP SPEED!!!", 0.3);

            feverFill.style.background = 'linear-gradient(90deg, #22d3ee, #818cf8)';
            feverFill.classList.add('warp-active');
            updateUI();
        }

        function processBugHit(note, index) {
            note.hit = true;

            state.lives--;
            animateLifeLoss();
            state.shake = 40;
            state.streak = 0;
            state.fever = 0;

            if (state.isFeverActive) {
                state.isFeverActive = false;
                state.isClearingForSpecial = false;
                state.isSpecialDropping = false;
                feverFill.classList.remove('overdrive-active');
            }
            if (state.isSuperRushActive) {
                state.isSuperRushActive = false;
                feverFill.classList.remove('warp-active');
            }

            if (audioEngine) audioEngine.sfxExplosion();
            showFeedback('GLITCH!', '#f0f');
            triggerShoutout("SYSTEM ERROR!", 0.5);

            for (let i = 0; i < 20; i++) particles.push(new Particle(note.x, note.y, '#0ff', true));
            for (let i = 0; i < 20; i++) particles.push(new Particle(note.x, note.y, '#f0f', true));

            notes.forEach(n => {
                if (n !== note) {
                    for (let i = 0; i < 8; i++) particles.push(new Particle(n.x, n.y, n.color, true));
                }
            });
            notes = [];

            updateUI();

            if (state.lives <= 0) endGame();
        }

        function processHit({ note, index, diff }) {
            note.hit = true;
            const isPerfect = diff < config.perfectZone;

            const basePoints = isPerfect ? 100 : 50;
            const levelMultiplier = state.level;
            const feverMultiplier = state.isFeverActive ? 4 : (state.isSuperRushActive ? 2 : 1);

            state.score += (basePoints * levelMultiplier * feverMultiplier);
            state.streak++;
            state.maxStreak = Math.max(state.streak, state.maxStreak);

            if (state.streak === 10) triggerShoutout("10 COMBO!", 1.0);
            else if (state.streak === 25) triggerShoutout("25 COMBO!", 1.2);
            else if (state.streak === 50) triggerShoutout("50 COMBO!!", 1.5);
            else if (state.streak === 100) triggerShoutout("UNSTOPPABLE!!", 1.8);

            if (!state.isFeverActive && !state.isSuperRushActive) {
                state.fever = Math.min(100, state.fever + (isPerfect ? 5 : 2));
                if (state.fever >= 100) activateFever();
            }

            if (audioEngine) audioEngine.sfxHit(isPerfect);

            const isChaotic = state.isFeverActive || state.isSuperRushActive;
            const pCount = isChaotic ? 100 : (isPerfect ? 25 : 10);
            const color = isChaotic ? (Math.random() > 0.5 ? '#a855f7' : '#fff') : (isPerfect ? '#fbbf24' : note.color);
            for (let i = 0; i < pCount; i++) particles.push(new Particle(note.x, note.y, color, isChaotic));

            state.shake = isChaotic ? 30 : (isPerfect ? 12 : 5);

            if (state.isSuperRushActive) showFeedback('AUTO!', '#22d3ee');
            else showFeedback(isChaotic ? 'INSANE!' : (isPerfect ? 'PERFECT' : 'GOOD'), isChaotic ? '#a855f7' : '#fff');

            updateUI();
            notes.splice(index, 1);
        }

        function processMissedNote() {
            if (state.streak > 5) {
                state.shake = 15;
                showFeedback('MISS', '#ef4444');
                triggerShoutout("COMBO BROKEN", 0.5);
            } else {
                showFeedback('MISS', '#ef4444');
            }

            state.lives--;
            animateLifeLoss();
            state.shake = 20;

            if (state.isFeverActive) {
                state.isFeverActive = false;
                state.isClearingForSpecial = false;
                state.isSpecialDropping = false;
                feverFill.classList.remove('overdrive-active');
                triggerShoutout("PULSE BROKEN!", 0.5);
            }
            if (state.isSuperRushActive) {
                state.isSuperRushActive = false;
                feverFill.classList.remove('warp-active');
            }

            if (audioEngine) audioEngine.sfxLifeLost();
            state.streak = 0;
            state.fever = 0;

            notes.forEach(n => {
                for (let i = 0; i < 8; i++) particles.push(new Particle(n.x, n.y, n.color, true));
            });
            notes = []; // Wipe the screen to give a breather

            updateUI();

            if (state.lives <= 0) endGame();
        }

        function checkLevelUp() {
            state.level++;
            state.shake = 25;
            triggerShoutout(`LEVEL ${state.level}!`, 1.5);

            if (state.level > 4 && audioEngine) {
                audioEngine.evolveSong();
            }

            if (audioEngine) audioEngine.sfxLevelUp();
            updateUI();
        }

        function activateFever() {
            state.isFeverActive = true;
            state.feverMeasures = 0;
            state.shake = 35;
            state.fever = 100;
            feverFill.style.background = 'linear-gradient(90deg, #ec4899, #a855f7)';

            if (audioEngine) audioEngine.sfxFever();
            triggerShoutout("OVERDRIVE!", 2.0);
            feverFill.classList.add('overdrive-active');
            updateUI();
        }

        function showFeedback(text, color = '#fff') {
            feedbackText.innerText = text;
            feedbackText.style.color = color;
            feedbackText.style.transform = 'scale(1.3) rotate(' + (Math.random() * 10 - 5) + 'deg)';
            setTimeout(() => {
                feedbackText.style.transform = 'scale(0)';
            }, 250);
        }

        function getRetroHeart() {
            // Procedurally draws a perfect 8-bit retro pixel heart
            return `<svg class="w-12 h-12" viewBox="0 0 11 11" style="shape-rendering: crispEdges; fill: currentColor;">
            <rect x="2" y="1" width="2" height="1"/>
            <rect x="7" y="1" width="2" height="1"/>
            <rect x="1" y="2" width="4" height="1"/>
            <rect x="6" y="2" width="4" height="1"/>
            <rect x="0" y="3" width="11" height="3"/>
            <rect x="1" y="6" width="9" height="1"/>
            <rect x="2" y="7" width="7" height="1"/>
            <rect x="3" y="8" width="5" height="1"/>
            <rect x="4" y="9" width="3" height="1"/>
            <rect x="5" y="10" width="1" height="1"/>
        </svg>`;
        }

        function animateLifeLoss() {
            const display = document.getElementById('life-loss-display');
            const container = document.getElementById('hearts-container');

            let html = '';
            for (let i = 0; i < state.lives; i++) {
                html += `<span class="inline-block">${getRetroHeart()}</span>`;
            }
            // The heart that represents the life just lost shatters
            html += `<span class="heart-shatter">${getRetroHeart()}</span>`;

            container.innerHTML = html;
            display.style.opacity = '1';
            display.style.transform = 'scale(1.2)';

            setTimeout(() => {
                display.style.opacity = '0';
                display.style.transform = 'scale(1)';
            }, 1200);
        }

        function updateUI() {
            scoreEl.innerText = state.score.toString().padStart(5, '0');
            streakEl.innerText = state.streak;
            levelEl.innerText = state.level;
            feverFill.style.width = state.fever + '%';
        }

        function startGame() {
            cancelAnimationFrame(menuAnimId);

            if (!audioEngine) audioEngine = new AudioEngine();
            audioEngine.start();

            clearTimeout(spawnTimeout);

            state = {
                score: 0,
                level: 1,
                streak: 0,
                maxStreak: 0,
                fever: 0,
                lives: 5,
                isFeverActive: false,
                feverMeasures: 0,
                isClearingForSpecial: false,
                isSpecialDropping: false,
                isSuperRushActive: false,
                superRushMeasures: 0,
                gameActive: true,
                lastFrame: performance.now(),
                shake: 0,
                beatPulse: 0,
                totalMeasures: 0,
                notesSpawned: 0,
                nextBugAt: Math.floor(Math.random() * 11) + 10
            };
            notes = [];
            particles = [];
            lanePulses = [0, 0, 0, 0];
            feverFill.style.background = 'linear-gradient(90deg, #ec4899, #a855f7)';
            feverFill.classList.remove('overdrive-active', 'warp-active');

            menu.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            triggerShoutout("BEGIN!", 1.0);
            updateUI();
            spawnNote();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            state.gameActive = false;
            clearTimeout(spawnTimeout);
            if (audioEngine) {
                audioEngine.stop();
                audioEngine.sfxGameOver();
            }

            gameOverScreen.classList.remove('hidden');
            gameOverScreen.classList.add('flex');
            document.getElementById('final-score').innerText = state.score;
            document.getElementById('final-streak').innerText = state.maxStreak;
            document.getElementById('final-level').innerText = state.level;
        }

        function gameLoop(now) {
            if (!state.gameActive) return;
            const dt = (now - state.lastFrame) / 1000;
            state.lastFrame = now;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            if (state.shake > 0) state.shake -= dt * 50;
            if (state.beatPulse > 0) state.beatPulse -= dt * 4;

            for (let i = 0; i < lanePulses.length; i++) {
                if (lanePulses[i] > 0) lanePulses[i] -= dt * 4;
            }

            for (let i = notes.length - 1; i >= 0; i--) {
                let n = notes[i];
                if (!n) continue;

                n.update(dt);

                if (state.isSuperRushActive && !n.hit && !n.isBug && n.y >= config.targetY) {
                    lanePulses[n.lane] = 1.0;
                    processHit({ note: n, index: i, diff: 0 });
                    continue;
                }

                if (n.y > canvas.height + 20) {
                    if (!n.hit) {
                        if (n.isSpecial) {
                            state.isFeverActive = false;
                            state.isSpecialDropping = false;
                            feverFill.classList.remove('overdrive-active');
                            state.fever = 0;
                            updateUI();
                            notes.splice(i, 1);
                        } else if (!n.isBug) {
                            processMissedNote();
                            break; // Stop updating remaining notes since array was wiped
                        } else {
                            notes.splice(i, 1); // Avoided a bug!
                        }
                    } else {
                        notes.splice(i, 1); // Clean up hit notes passing screen bottom
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(dt);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);

            if (state.isSuperRushActive) {
                bgGrad.addColorStop(0, '#0f172a');
                bgGrad.addColorStop(1, '#083344');
            } else {
                bgGrad.addColorStop(0, '#0f172a');
                bgGrad.addColorStop(1, state.isFeverActive ? '#4c1d95' : '#1e1b4b');
            }

            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if (state.shake > 0) {
                ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
            }

            ctx.save();
            if (state.beatPulse > 0) {
                const pulseScale = 1 + (state.beatPulse * 0.03);
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(pulseScale, pulseScale);
                ctx.translate(-canvas.width / 2, -canvas.height / 2);
            }

            const time = performance.now() / 1000;
            const speed = 100 * (1 + (state.level * 0.2)) * (state.isSuperRushActive ? 10 : 1);
            const gridY = (time * speed) % 80;

            let gridColor = 'rgba(236, 72, 153, 0.15)';
            if (state.isFeverActive) gridColor = 'rgba(168, 85, 247, 0.3)';
            if (state.isSuperRushActive) gridColor = 'rgba(34, 211, 238, 0.3)';

            if (state.beatPulse > 0.1) {
                ctx.shadowBlur = state.beatPulse * 15;
                ctx.shadowColor = gridColor.replace(/[\d.]+\)$/g, '1)');
            }

            ctx.strokeStyle = gridColor;
            ctx.lineWidth = (1 + (state.level * 0.2)) * (1 + (state.beatPulse * 0.5));
            ctx.beginPath();
            for (let y = gridY; y < canvas.height; y += 80) {
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
            }
            const centerX = canvas.width / 2;
            for (let i = -5; i <= 5; i++) {
                ctx.moveTo(centerX + i * 60, 0);
                ctx.lineTo(centerX + i * 200, canvas.height);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;

            ctx.restore();

            const renderWidth = Math.min(window.innerWidth * 0.9, 450);
            const laneWidth = renderWidth / config.laneCount;

            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 2;
            lanes.forEach((x, i) => {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();

                if (lanePulses[i] > 0) {
                    const pulseGrad = ctx.createLinearGradient(0, config.targetY, 0, 0);
                    const color = state.isSuperRushActive ? '34, 211, 238' : (state.isFeverActive ? '168, 85, 247' : '236, 72, 153');
                    pulseGrad.addColorStop(0, `rgba(${color}, ${lanePulses[i] * 0.5})`);
                    pulseGrad.addColorStop(1, `rgba(${color}, 0)`);
                    ctx.fillStyle = pulseGrad;
                    ctx.fillRect(x - laneWidth / 2, 0, laneWidth, canvas.height);
                }
            });

            // Target Zone
            ctx.fillStyle = state.isSuperRushActive ? 'rgba(34, 211, 238, 0.2)' : (state.isFeverActive ? 'rgba(168, 85, 247, 0.2)' : 'rgba(255,255,255,0.05)');
            ctx.beginPath();
            const startX = lanes[0] - (laneWidth / 2) + 10;
            ctx.roundRect(startX, config.targetY - 20, renderWidth - 20, 40, 10);
            ctx.fill();
            ctx.shadowBlur = 15;
            ctx.shadowColor = state.isSuperRushActive ? '#22d3ee' : (state.isFeverActive ? '#a855f7' : '#ec4899');
            ctx.strokeStyle = state.isSuperRushActive ? '#22d3ee' : (state.isFeverActive ? '#a855f7' : 'rgba(236, 72, 153, 0.8)');
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 0;

            notes.forEach(note => note.draw());
            particles.forEach(p => p.draw());

            ctx.restore();
        }

        function handleTap(laneIndex) {
            if (!audioEngine) return;
            if (audioEngine.ctx.state === 'suspended') audioEngine.ctx.resume();
            lanePulses[laneIndex] = 1.0;
            triggerHit(laneIndex);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                const nextNote = notes.find(n => !n.hit && !n.isBug);
                const lane = nextNote ? nextNote.lane : Math.floor(Math.random() * config.laneCount);
                handleTap(lane);
            }
            if (['Digit1', 'Digit2', 'Digit3', 'Digit4'].includes(e.code)) {
                const lane = parseInt(e.key) - 1;
                handleTap(lane);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const renderWidth = Math.min(rect.width * 0.9, 450);
            const offsetX = (rect.width - renderWidth) / 2;
            const laneWidth = renderWidth / config.laneCount;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touchX = e.changedTouches[i].clientX - rect.left - offsetX;
                const laneIndex = Math.floor(touchX / laneWidth);
                if (laneIndex >= 0 && laneIndex < config.laneCount) {
                    handleTap(laneIndex);
                }
            }
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const renderWidth = Math.min(rect.width * 0.9, 450);
            const offsetX = (rect.width - renderWidth) / 2;
            const laneWidth = renderWidth / config.laneCount;

            const mouseX = e.clientX - rect.left - offsetX;
            const laneIndex = Math.floor(mouseX / laneWidth);
            if (laneIndex >= 0 && laneIndex < config.laneCount) {
                handleTap(laneIndex);
            }
        });
    </script>
</body>

</html>
