<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PulseWarp - Mobile Rhythm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: linear-gradient(to bottom, #1e293b, #0f172a);
        }

        .ui-overlay {
            position: absolute;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            color: white;
            z-index: 10;
        }

        .fever-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .overdrive-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ec4899, #a855f7);
            transition: width 0.1s linear, background 0.3s ease;
        }

        .overdrive-active {
            box-shadow: 0 0 20px #a855f7;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .modal {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }

        #shoutout-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            text-align: center;
            font-size: 4rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px #ec4899, 0 0 40px #ec4899;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 50;
            white-space: pre-wrap;
            line-height: 1.1;
        }

        .shoutout-active {
            transform: translate(-50%, -50%) scale(1.2) !important;
            opacity: 1 !important;
        }

        .shoutout-fade {
            transform: translate(-50%, -50%) scale(2) !important;
            opacity: 0 !important;
        }

        @keyframes shatter-heart {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            20% {
                transform: scale(1.5);
                filter: brightness(1.5);
            }

            100% {
                transform: scale(0.5) translateY(100px) rotate(45deg);
                opacity: 0;
                filter: grayscale(1);
            }
        }

        .heart-shatter {
            display: inline-block;
            animation: shatter-heart 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center;
        }

        #life-loss-display {
            transition: all 0.3s ease-out;
            transform: scale(1);
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="ui-overlay" id="ui-layer">
            <div class="flex justify-between items-start">
                <div class="flex gap-8">
                    <div>
                        <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Score</h2>
                        <div id="score-display" class="text-3xl font-black text-white">00000</div>
                    </div>
                    <div>
                        <h2 class="text-xs font-bold uppercase tracking-widest text-cyan-400">Level</h2>
                        <div id="level-display"
                            class="text-3xl font-black text-cyan-500 drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]">1
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Streak</h2>
                    <div id="streak-display" class="text-4xl font-black text-cyan-500">0</div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-2 mb-10">
                <div id="feedback-text"
                    class="text-2xl font-black uppercase italic tracking-tighter scale-0 transition-transform duration-75">
                    Perfect!</div>
                <div class="fever-bar">
                    <div id="fever-fill" class="overdrive-progress"></div>
                </div>
                <div class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Pulse Core</div>
            </div>
        </div>

        <div id="shoutout-text">10 COMBO!</div>

        <div id="life-loss-display"
            class="absolute top-[30%] left-0 w-full flex justify-center pointer-events-none z-40 opacity-0">
            <div id="hearts-container" class="flex gap-3 text-pink-500 drop-shadow-[0_0_15px_rgba(236,72,153,1)]">
            </div>
        </div>

        <canvas id="gameCanvas" class="z-0"></canvas>

        <div id="menu"
            class="absolute inset-0 flex items-center justify-center z-20 overflow-hidden bg-slate-900 cursor-pointer"
            onclick="startGame()">
            <canvas id="menuCanvas" class="absolute inset-0 w-full h-full object-cover z-0"></canvas>

            <div class="absolute bottom-16 w-full text-center pointer-events-none z-10">
                <p
                    class="text-white text-sm font-bold tracking-[0.4em] uppercase animate-pulse opacity-60 drop-shadow-lg">
                    Tap Anywhere to Start</p>
            </div>
        </div>

        <div id="game-over" class="absolute inset-0 hidden items-center justify-center modal z-30 p-6 text-center">
            <div class="max-w-sm w-full">
                <h1 id="end-status" class="text-4xl font-black text-white mb-2">SESSION ENDED</h1>
                <p id="end-reason" class="text-slate-400 mb-6">The rhythm got the best of you.</p>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 backdrop-blur-md">
                        <div class="text-xs text-slate-500 uppercase font-bold">Best Streak</div>
                        <div id="final-streak" class="text-2xl font-black text-white">0</div>
                    </div>
                    <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 backdrop-blur-md">
                        <div class="text-xs text-slate-500 uppercase font-bold">Level Reached</div>
                        <div id="final-level" class="text-2xl font-black text-cyan-500">1</div>
                    </div>
                    <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700 col-span-2 backdrop-blur-md">
                        <div class="text-xs text-slate-500 uppercase font-bold">Final Score</div>
                        <div id="final-score" class="text-5xl font-black text-white drop-shadow-md">0</div>
                    </div>
                </div>
                <button onclick="startGame()"
                    class="w-full py-4 bg-white text-slate-900 font-bold rounded-2xl shadow-xl transform transition active:scale-95 mb-3 text-lg">PLAY
                    AGAIN</button>
                <button onclick="location.reload()"
                    class="w-full py-2 text-slate-400 hover:text-white text-sm font-bold transition">MAIN MENU</button>
            </div>
        </div>
    </div>

    <script>
        // --- ANIMATED MENU BACKGROUND LOGIC ---
        const menuCanvas = document.getElementById('menuCanvas');
        const menuCtx = menuCanvas.getContext('2d');
        let menuAnimId;
        let menuTime = 0;

        const menuStars = Array.from({ length: 100 }, () => ({
            x: Math.random(),
            y: Math.random(),
            size: Math.random() * 2.5,
            speed: Math.random() * 0.5 + 0.2
        }));

        function resizeMenu() {
            menuCanvas.width = window.innerWidth;
            menuCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeMenu);
        resizeMenu();

        function drawMenu() {
            menuTime += 0.016;
            const cx = menuCanvas.width / 2;
            const cy = menuCanvas.height / 2;

            const bgGrad = menuCtx.createLinearGradient(0, 0, 0, menuCanvas.height);
            bgGrad.addColorStop(0, '#020617');
            bgGrad.addColorStop(0.5, '#0f172a');
            bgGrad.addColorStop(1, '#1e1b4b');
            menuCtx.fillStyle = bgGrad;
            menuCtx.fillRect(0, 0, menuCanvas.width, menuCanvas.height);

            menuCtx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            menuStars.forEach(star => {
                star.y += star.speed * 0.002;
                if (star.y > 1) {
                    star.y = 0;
                    star.x = Math.random();
                }
                menuCtx.beginPath();
                menuCtx.arc(star.x * menuCanvas.width, star.y * menuCanvas.height, star.size, 0, Math.PI * 2);
                menuCtx.fill();
            });

            const vpY = menuCanvas.height * 0.40;

            const trailGrad = menuCtx.createLinearGradient(0, vpY, 0, menuCanvas.height);
            trailGrad.addColorStop(0, 'rgba(168, 85, 247, 0)');
            trailGrad.addColorStop(1, 'rgba(168, 85, 247, 0.3)');
            menuCtx.fillStyle = trailGrad;
            menuCtx.beginPath();
            menuCtx.moveTo(cx - 30, vpY);
            menuCtx.lineTo(cx + 30, vpY);
            menuCtx.lineTo(cx + 300, menuCanvas.height);
            menuCtx.lineTo(cx - 300, menuCanvas.height);
            menuCtx.closePath();
            menuCtx.fill();

            menuCtx.strokeStyle = 'rgba(34, 211, 238, 0.4)';
            menuCtx.lineWidth = Math.max(2, menuCanvas.width * 0.005);
            for (let i = -3; i <= 3; i++) {
                menuCtx.beginPath();
                menuCtx.moveTo(cx + (i * 15), vpY);
                menuCtx.lineTo(cx + (i * 200), menuCanvas.height);
                menuCtx.stroke();
            }

            menuCtx.strokeStyle = 'rgba(236, 72, 153, 0.3)';
            const gridSpeed = (menuTime * 60) % 20;
            for (let i = 1; i < 25; i++) {
                const gridOffset = i + (gridSpeed / 20);
                const y = vpY + Math.pow(gridOffset, 2.3) * (menuCanvas.height * 0.0012);
                if (y > menuCanvas.height) break;
                if (y < vpY) continue;
                menuCtx.beginPath();
                menuCtx.moveTo(0, y);
                menuCtx.lineTo(menuCanvas.width, y);
                menuCtx.lineWidth = gridOffset * 0.3;
                menuCtx.stroke();
            }

            const dx = cx;
            const dy = menuCanvas.height * 0.60 + Math.sin(menuTime * 1.5) * 20;
            const dSize = Math.min(menuCanvas.width * 0.25, 120);

            menuCtx.shadowBlur = 60 + Math.sin(menuTime * 3) * 20;
            menuCtx.shadowColor = '#c084fc';

            menuCtx.fillStyle = '#a855f7';
            menuCtx.beginPath();
            menuCtx.moveTo(dx, dy - dSize);
            menuCtx.lineTo(dx + dSize, dy);
            menuCtx.lineTo(dx, dy + dSize);
            menuCtx.lineTo(dx - dSize, dy);
            menuCtx.closePath();
            menuCtx.fill();

            menuCtx.shadowBlur = 0;
            menuCtx.strokeStyle = '#ffffff';
            menuCtx.lineWidth = dSize * 0.12;
            menuCtx.lineJoin = 'miter';
            menuCtx.stroke();

            menuCtx.fillStyle = '#ffffff';
            menuCtx.shadowBlur = 30;
            menuCtx.shadowColor = '#ffffff';
            menuCtx.beginPath();
            menuCtx.moveTo(dx, dy - dSize * 0.4);
            menuCtx.lineTo(dx + dSize * 0.4, dy);
            menuCtx.lineTo(dx, dy + dSize * 0.4);
            menuCtx.lineTo(dx - dSize * 0.4, dy);
            menuCtx.closePath();
            menuCtx.fill();
            menuCtx.shadowBlur = 0;

            menuCtx.textAlign = 'center';
            menuCtx.textBaseline = 'middle';
            const fontSize = Math.min(menuCanvas.width * 0.18, 140);
            menuCtx.font = `italic 900 ${fontSize}px Inter, sans-serif`;

            const titleY = menuCanvas.height * 0.18;

            menuCtx.fillStyle = '#ffffff';
            menuCtx.shadowBlur = 40;
            menuCtx.shadowColor = 'rgba(255,255,255,0.5)';
            menuCtx.fillText('PULSE', cx, titleY);

            menuCtx.fillStyle = '#22d3ee';
            menuCtx.shadowBlur = 60;
            menuCtx.shadowColor = '#22d3ee';
            menuCtx.fillText('WARP', cx, titleY + fontSize * 0.9);
            menuCtx.shadowBlur = 0;

            menuAnimId = requestAnimationFrame(drawMenu);
        }

        document.fonts.ready.then(function () {
            drawMenu();
        });


        // --- MAIN GAME LOGIC ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-display');
        const streakEl = document.getElementById('streak-display');
        const levelEl = document.getElementById('level-display');
        const feverFill = document.getElementById('fever-fill');
        const feedbackText = document.getElementById('feedback-text');
        const shoutoutText = document.getElementById('shoutout-text');
        const menu = document.getElementById('menu');
        const gameOverScreen = document.getElementById('game-over');

        // Configuration
        let state = {
            score: 0,
            level: 1,
            streak: 0,
            maxStreak: 0,
            fever: 0,
            lives: 5,
            isFeverActive: false,
            feverMeasures: 0,
            gameActive: false,
            lastFrame: 0,
            shake: 0,
            beatPulse: 0,
            difficulty: 1.0,
            totalMeasures: 0,
            notesSpawned: 0,
            nextBugAt: 0
        };

        const config = {
            targetY: 0,
            laneCount: 4,
            perfectZone: 0.10,
            hitRange: 0.25,
            measuresPerLevel: 16
        };

        let notes = [];
        let particles = [];
        let lanes = [];
        let lanePulses = [0, 0, 0, 0];
        let audioEngine = null;

        function triggerShoutout(text, pitch = 1.0) {
            shoutoutText.innerText = text;
            shoutoutText.classList.remove('shoutout-fade');
            shoutoutText.classList.add('shoutout-active');

            setTimeout(() => {
                shoutoutText.classList.remove('shoutout-active');
                shoutoutText.classList.add('shoutout-fade');
            }, 1000);

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.pitch = pitch;
                utterance.rate = 1.3;
                utterance.volume = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        class AudioEngine {
            constructor() {
                this.isPlaying = false;
                this.timerID = null;

                this.bpm = 135;
                this.bar = 0;
                this.nextNoteTime = 0;
                this.step = 0;
                this.chords = [];
                this.kickTimes = [];
                this.AUDIO_LOOKAHEAD = 2.0;
                this.arpIndex = 0;

                this.reverb = new Tone.Reverb({ decay: 4.0, wet: 0.4 }).toDestination();
                this.delay = new Tone.PingPongDelay("8n.", 0.3).connect(this.reverb);

                this.kick = new Tone.MembraneSynth({
                    pitchDecay: 0.06,
                    octaves: 5,
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4 }
                }).toDestination();
                this.kick.volume.value = 2;

                this.snare = new Tone.NoiseSynth({
                    noise: { type: 'white' },
                    envelope: { attack: 0.001, decay: 0.2, sustain: 0 }
                }).toDestination();
                this.snare.volume.value = -14;

                this.hat = new Tone.NoiseSynth({
                    noise: { type: 'white' },
                    envelope: { attack: 0.001, decay: 0.05, sustain: 0 }
                }).toDestination();
                this.hat.volume.value = -20;

                this.bass = new Tone.Synth({
                    oscillator: { type: "sawtooth" },
                    envelope: { attack: 0.01, decay: 0.2, sustain: 0.0, release: 0.2 }
                });
                this.bassFilter = new Tone.Filter(600, "lowpass").toDestination();
                this.bass.connect(this.bassFilter);
                this.bass.volume.value = -8;

                this.lead = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "fmtriangle", modulationType: "sine", modulationIndex: 2, harmonicity: 2 },
                    envelope: { attack: 0.01, decay: 1.5, sustain: 0.1, release: 2.0 }
                }).connect(this.delay).connect(this.reverb).toDestination();
                this.lead.volume.value = -20;

                this.pad = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "sine" },
                    envelope: { attack: 1.5, decay: 1.0, sustain: 0.8, release: 3.0 }
                }).connect(this.reverb).toDestination();
                this.pad.volume.value = -22;

                this.sfx = new Tone.PolySynth(Tone.Synth).toDestination();
                this.sfx.volume.value = -6;
            }

            generateProceduralSong() {
                this.bpm = Math.floor(Math.random() * 11) + 130;
                this.evolveSong();
            }

            evolveSong() {
                const bassTypes = ['sawtooth', 'square', 'fmtriangle'];
                const leadTypes = ['sine', 'sawtooth', 'fmsquare', 'triangle'];

                this.bass.set({ oscillator: { type: bassTypes[Math.floor(Math.random() * bassTypes.length)] } });
                this.lead.set({ oscillator: { type: leadTypes[Math.floor(Math.random() * leadTypes.length)] } });

                const baseFreq = 43.65;
                const getFreq = (semitones) => baseFreq * Math.pow(2, semitones / 12);

                const progressions = [
                    [0, 8, 10, 0],
                    [0, 8, 3, 10],
                    [0, 5, 8, 7],
                    [8, 10, 0, 0]
                ];

                const prog = progressions[Math.floor(Math.random() * progressions.length)];

                this.chords = prog.map(rootSemitone => {
                    const root = getFreq(rootSemitone);
                    const isMajor = [3, 8, 10].includes(rootSemitone);
                    const third = isMajor ? 4 : 3;

                    return {
                        root: root,
                        chord: [root * 4, root * 4 * Math.pow(2, third / 12), root * 4 * Math.pow(2, 7 / 12)],
                        arp: [root * 8, root * 8 * Math.pow(2, third / 12), root * 8 * Math.pow(2, 7 / 12), root * 16]
                    };
                });
            }

            async start() {
                await Tone.start();
                if (this.isPlaying) return;
                this.isPlaying = true;
                this.kickTimes = [];
                this.arpIndex = 0;

                this.generateProceduralSong();

                const beatDuration = 60 / this.bpm;
                const introBeats = 8;
                const introDuration = introBeats * beatDuration;

                const now = Tone.now();
                for (let i = 0; i < introBeats; i++) {
                    const kTime = now + (i * beatDuration);
                    this.kick.triggerAttackRelease("C1", "8n", kTime);
                    this.kickTimes.push(kTime);
                }

                this.nextNoteTime = now + introDuration - this.AUDIO_LOOKAHEAD;

                this.step = 0;
                this.bar = 0;
                this.schedule();
            }

            stop() {
                this.isPlaying = false;
                cancelAnimationFrame(this.timerID);
                this.kickTimes = [];
            }

            schedule() {
                if (!this.isPlaying) return;

                if (this.nextNoteTime < Tone.now() - 0.5) {
                    this.nextNoteTime = Tone.now() + 0.1;
                }

                while (this.nextNoteTime < Tone.now() + 0.1) {

                    let playTime = this.nextNoteTime + this.AUDIO_LOOKAHEAD;
                    let fallDuration = Math.max(0.5, 2.0 - ((state.level - 1) * 0.1));

                    this.playSequenceStep(this.step, state.level, playTime);

                    // Smooth real-time drain of the fever bar based on current step
                    if (state.gameActive && state.isFeverActive) {
                        state.fever = 100 - (((state.feverMeasures * 16) + this.step) / 128) * 100;
                        updateUI();
                    }

                    if (state.gameActive) {
                        let shouldSpawn = false;
                        let isBug = false;
                        let isDiamond = false;

                        if (state.level === 1) shouldSpawn = (this.step % 4 === 0);
                        else if (state.level === 2) shouldSpawn = (this.step % 4 === 0 || this.step === 10);
                        else if (state.level >= 3) shouldSpawn = (this.step % 2 === 0);

                        if (shouldSpawn) {
                            state.notesSpawned++;
                            if (state.notesSpawned >= state.nextBugAt) {
                                isBug = true;
                                state.nextBugAt = state.notesSpawned + Math.floor(Math.random() * 11) + 10;
                            }

                            // Randomly spawn hold notes from level 3 onwards
                            let isHold = false;
                            let duration = 0;
                            if (state.level >= 3 && !isBug && Math.random() < 0.2) {
                                isHold = true;
                                duration = (60 / this.bpm); // 1 beat duration
                            }

                            // In Overdrive, normal notes become diamonds. Bugs remain bugs.
                            if (state.isFeverActive && !isBug) {
                                isDiamond = true;
                            }

                            notes.push(new Note(isBug, isDiamond, isHold, duration, playTime, fallDuration));
                        }
                    }

                    this.step++;
                    if (this.step >= 16) {
                        this.step = 0;
                        this.bar = (this.bar + 1) % 4;

                        if (state.gameActive) {
                            state.totalMeasures++;
                            if (state.totalMeasures >= state.level * config.measuresPerLevel) {
                                checkLevelUp();
                            }

                            if (state.isFeverActive) {
                                state.feverMeasures++;
                                if (state.feverMeasures >= 8) {
                                    // Survived all 8 measures flawlessly!
                                    state.isFeverActive = false;
                                    state.fever = 0;
                                    state.score += 50000;
                                    feverFill.classList.remove('overdrive-active');
                                    triggerShoutout("OVERDRIVE CLEARED!\n+50,000", 1.5);
                                    if (audioEngine) audioEngine.sfxLevelUp();
                                    updateUI();
                                }
                            }
                        }
                    }

                    let currentBpm = this.bpm;
                    this.nextNoteTime += (60 / currentBpm) / 4;
                }
                this.timerID = requestAnimationFrame(() => this.schedule());
            }

            playSequenceStep(step, level, time) {
                const chord = this.chords[this.bar];

                if (step % 4 === 0) {
                    this.kick.triggerAttackRelease("C1", "8n", time);
                    this.kickTimes.push(time);
                }

                if (level >= 2 && (step === 4 || step === 12)) {
                    this.snare.triggerAttackRelease("16n", time);
                }

                if (level >= 2 && step % 2 !== 0) {
                    this.hat.triggerAttackRelease("32n", time, 0.2);
                } else if (level >= 2 && step % 4 === 2) {
                    this.hat.triggerAttackRelease("16n", time, 0.4);
                }

                if (step % 2 === 0 || step === 7 || step === 15) {
                    this.bass.triggerAttackRelease(chord.root, "16n", time);
                }

                if (level >= 3 && step === 0) {
                    this.pad.triggerAttackRelease(chord.chord, "1m", time);
                }
            }

            sfxHit(perfect) {
                const chord = this.chords[this.bar];
                if (chord && chord.arp) {
                    // Play the interactive melody line
                    let arpFreq = chord.arp[this.arpIndex];
                    if (state.isFeverActive) arpFreq *= 2;
                    this.lead.triggerAttackRelease(arpFreq, "8n", Tone.now(), 0.4);
                    this.arpIndex = (this.arpIndex + 1) % chord.arp.length;

                    // Play perfectly harmonized percussion (no more out-of-key beeps!)
                    if (perfect) {
                        this.sfx.triggerAttackRelease(arpFreq * 2, "32n", Tone.now(), 0.2);
                    } else {
                        this.sfx.triggerAttackRelease(chord.root * 4, "32n", Tone.now(), 0.1);
                    }
                }
            }

            sfxLifeLost() {
                const noise = new Tone.NoiseSynth({ envelope: { attack: 0.01, decay: 0.4 } }).toDestination();
                noise.triggerAttackRelease("8n");
                const synth = new Tone.Synth({ oscillator: { type: "square" } }).toDestination();
                synth.triggerAttackRelease("C2", "8n");
                synth.frequency.rampTo("C1", 0.3);
            }
            sfxExplosion() {
                const noise = new Tone.NoiseSynth({ noise: { type: "brown" }, envelope: { attack: 0.01, decay: 0.8 } }).toDestination();
                noise.triggerAttackRelease("2n");
            }
            sfxGameOver() {
                const synth = new Tone.Synth({ oscillator: { type: "pwm", modulationFrequency: 0.2 } }).toDestination();
                synth.triggerAttackRelease("C2", "1n");
                synth.frequency.rampTo("C0", 1.5);
            }
            sfxFever() {
                this.sfx.triggerAttackRelease(["C4", "E4", "G4", "C5"], "2n");
            }
            sfxLevelUp() {
                const time = Tone.now();
                this.sfx.triggerAttackRelease("A4", "16n", time);
                this.sfx.triggerAttackRelease("C#5", "16n", time + 0.1);
                this.sfx.triggerAttackRelease("E5", "8n", time + 0.2);
            }
        }

        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const renderWidth = Math.min(window.innerWidth * 0.9, 450);
            config.targetY = canvas.height - 120;
            const laneWidth = renderWidth / config.laneCount;

            const offsetX = (canvas.width - renderWidth) / 2;
            lanes = Array.from({ length: config.laneCount }, (_, i) => offsetX + (laneWidth * i) + (laneWidth / 2));
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, chaotic = false) {
                this.x = x;
                this.y = y;
                this.color = color;
                const speedMultiplier = chaotic ? 4 : 1;
                this.vx = (Math.random() - 0.5) * 20 * speedMultiplier;
                this.vy = (Math.random() - 0.5) * 20 * speedMultiplier;
                this.life = 1.0;
                this.size = (Math.random() * 6 + 2) * (chaotic ? 2 : 1);
            }
            update(dt) {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= dt * 2.5;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class Note {
            constructor(isBug = false, isDiamond = false, isHold = false, duration = 0, targetTime, fallDuration) {
                this.isBug = isBug;
                this.isDiamond = isDiamond;
                this.isHold = isHold;
                this.duration = duration;
                this.targetTime = targetTime;
                this.fallDuration = fallDuration;

                this.lane = Math.floor(Math.random() * config.laneCount);
                this.x = lanes[this.lane];
                this.y = -50;
                this.hit = false;
                this.isTracking = false;
                this.holdProgress = 0;
                this.size = 35;
                this.stretchX = 1;
                this.stretchY = 1;

                if (this.isBug) {
                    this.color = '#f0f';
                } else if (this.isDiamond) {
                    this.color = '#c084fc';
                    this.size = 45;
                } else if (this.isHold) {
                    this.color = '#10b981';
                } else {
                    const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];
                    this.color = state.isFeverActive ? '#a855f7' : (colors[Math.min(state.level - 1, 3)] || '#ec4899');
                }
            }

            update(dt) {
                const now = Tone.now();
                const timeRemaining = this.targetTime - now;
                const totalDistance = config.targetY + 50;

                const progress = 1 - (timeRemaining / this.fallDuration);
                this.y = -50 + (totalDistance * progress);

                if (this.isHold && this.isTracking) {
                    const holdEndTime = this.targetTime + this.duration;
                    this.holdProgress = Math.min(1, (now - this.targetTime) / this.duration);
                    
                    if (now >= holdEndTime) {
                        this.hit = true;
                        this.isTracking = false;
                        processHoldComplete(this);
                    }
                }

                const dist = Math.abs(this.y - config.targetY);
                if (dist < 150 && !this.isBug && !this.isDiamond && !this.isHold) {
                    this.stretchY = 1.3;
                    this.stretchX = 0.7;
                } else {
                    this.stretchY = 1;
                    this.stretchX = 1;
                }
            }

            draw() {
                if (this.hit && !this.isHold) return;

                ctx.save();
                
                // Draw Hold Trail
                if (this.isHold) {
                    const tailY = this.y - (this.duration / this.fallDuration) * (config.targetY + 50);
                    const grad = ctx.createLinearGradient(this.x, tailY, this.x, this.y);
                    grad.addColorStop(0, 'rgba(16, 185, 129, 0.2)');
                    grad.addColorStop(1, this.isTracking ? '#10b981' : 'rgba(16, 185, 129, 0.6)');
                    
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = this.size * 0.8;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x, tailY);
                    ctx.stroke();

                    // Active tracking glow
                    if (this.isTracking) {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = '#10b981';
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 4;
                        ctx.stroke();
                    }
                }

                ctx.translate(this.x, this.y);
                ctx.scale(this.stretchX, this.stretchY);

                ctx.shadowBlur = (this.isDiamond || (this.isHold && !this.isTracking)) ? 0 : 20;
                ctx.shadowColor = this.color;

                if (this.isBug) {
                    ctx.fillStyle = '#0ff';
                    ctx.fillRect(-this.size / 2 - 3, -this.size / 2 + 2, this.size, this.size);

                    ctx.fillStyle = '#f0f';
                    ctx.fillRect(-this.size / 2 + 3, -this.size / 2 - 2, this.size, this.size);

                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);

                    ctx.fillStyle = '#000';
                    const yOffset1 = (performance.now() / 20) % this.size;
                    const yOffset2 = (performance.now() / 30 + 10) % this.size;
                    ctx.fillRect(-this.size / 2, -this.size / 2 + yOffset1, this.size, 3);
                    ctx.fillRect(-this.size / 2, -this.size / 2 + yOffset2, this.size, 5);

                } else if (this.isDiamond) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size, 0);
                    ctx.lineTo(0, this.size);
                    ctx.lineTo(-this.size, 0);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 4;
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size / 2);
                    ctx.lineTo(this.size / 2, 0);
                    ctx.lineTo(0, this.size / 2);
                    ctx.lineTo(-this.size / 2, 0);
                    ctx.closePath();
                    ctx.fill();

                } else if (this.isHold) {
                    ctx.fillStyle = this.isTracking ? '#fff' : this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    const grad = ctx.createLinearGradient(0, -this.size / 2, 0, this.size / 2);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.5, this.color);
                    grad.addColorStop(1, '#000000');

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(-this.size / 2 + 5, -this.size / 4, this.size - 10, this.size / 2, 8);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function triggerHit(laneIndex, silent = false) {
            if (!state.gameActive) return;

            let hitNote = null;
            let minTime = Infinity;

            notes.forEach((note, index) => {
                if (note.lane === laneIndex && !note.hit) {
                    const diff = Math.abs(note.targetTime - Tone.now());
                    if (diff < config.hitRange && diff < minTime) {
                        minTime = diff;
                        hitNote = { note, index, diff };
                    }
                }
            });

            if (hitNote) {
                if (hitNote.note.isBug) processBugHit(hitNote.note, hitNote.index);
                else processHit(hitNote);
            } else if (!silent && (state.fever < 100 || state.isFeverActive)) {
                processMistap();
            }
        }

        function processMistap() {
            if (state.streak > 5) {
                state.shake = 15;
                showFeedback('MISS', '#ef4444');
                triggerShoutout("COMBO BROKEN", 0.5);
            } else {
                showFeedback('MISS', '#ef4444');
            }

            state.lives--;
            animateLifeLoss();
            state.shake = 20;

            if (state.isFeverActive) {
                state.isFeverActive = false;
                feverFill.classList.remove('overdrive-active');
                triggerShoutout("OVERDRIVE FAILED!", 0.5);
            }

            if (audioEngine) audioEngine.sfxLifeLost();
            state.streak = 0;
            state.fever = 0;
            updateUI();

            if (state.lives <= 0) endGame();
        }

        function processBugHit(note, index) {
            note.hit = true;

            state.lives--;
            animateLifeLoss();
            state.shake = 40;
            state.streak = 0;
            state.fever = 0;

            if (state.isFeverActive) {
                state.isFeverActive = false;
                feverFill.classList.remove('overdrive-active');
                triggerShoutout("OVERDRIVE FAILED!", 0.5);
            }

            if (audioEngine) audioEngine.sfxExplosion();
            showFeedback('GLITCH!', '#f0f');
            triggerShoutout("SYSTEM ERROR!", 0.5);

            for (let i = 0; i < 20; i++) particles.push(new Particle(note.x, note.y, '#0ff', true));
            for (let i = 0; i < 20; i++) particles.push(new Particle(note.x, note.y, '#f0f', true));

            notes.forEach(n => {
                if (n !== note) {
                    for (let i = 0; i < 8; i++) particles.push(new Particle(n.x, n.y, n.color, true));
                }
            });
            notes = [];

            updateUI();

            if (state.lives <= 0) endGame();
        }

        function processHit({ note, index, diff }) {
            const isPerfect = diff < config.perfectZone;
            const now = Tone.now();
            const isLate = now > note.targetTime;
            const timingText = isPerfect ? '' : (isLate ? ' (LATE)' : ' (EARLY)');

            if (note.isHold) {
                note.isTracking = true;
                note.hit = true; // Mark as initiated
                showFeedback((isPerfect ? 'SUSTAIN' : 'HOLD') + timingText, '#10b981');
                if (audioEngine) audioEngine.sfxHit(isPerfect);
                return;
            }

            note.hit = true;
            const basePoints = isPerfect ? 100 : 50;
            const levelMultiplier = state.level;
            const feverMultiplier = state.isFeverActive ? 4 : 1;

            state.score += (basePoints * levelMultiplier * feverMultiplier);
            state.streak++;
            state.maxStreak = Math.max(state.streak, state.maxStreak);

            if (state.streak === 10) triggerShoutout("10 COMBO!", 1.0);
            else if (state.streak === 25) triggerShoutout("25 COMBO!", 1.2);
            else if (state.streak === 50) triggerShoutout("50 COMBO!!", 1.5);
            else if (state.streak === 100) triggerShoutout("UNSTOPPABLE!!", 1.8);

            if (!state.isFeverActive) {
                state.fever = Math.min(100, state.fever + (isPerfect ? 5 : 2));
                // No longer automatic: if (state.fever >= 100) activateFever();
            }

            if (audioEngine) audioEngine.sfxHit(isPerfect);

            const isChaotic = state.isFeverActive;
            const pCount = isChaotic ? 100 : (isPerfect ? 25 : 10);
            const color = isChaotic ? (Math.random() > 0.5 ? '#a855f7' : '#fff') : (isPerfect ? '#fbbf24' : note.color);
            for (let i = 0; i < pCount; i++) particles.push(new Particle(note.x, note.y, color, isChaotic));

            state.shake = isChaotic ? 30 : (isPerfect ? 12 : 5);

            showFeedback((isChaotic ? 'INSANE!' : (isPerfect ? 'PERFECT' : 'GOOD')) + timingText, isChaotic ? '#a855f7' : '#fff');

            updateUI();
            notes.splice(index, 1);
        }

        function processHoldComplete(note) {
            const index = notes.indexOf(note);
            if (index > -1) {
                state.score += (500 * state.level * (state.isFeverActive ? 4 : 1));
                state.streak++;
                state.maxStreak = Math.max(state.streak, state.maxStreak);
                
                showFeedback('COMPLETE!', '#10b981');
                if (audioEngine) audioEngine.sfxLevelUp();
                
                const pCount = 30;
                for (let i = 0; i < pCount; i++) particles.push(new Particle(note.x, config.targetY, '#10b981', false));
                
                updateUI();
                notes.splice(index, 1);
            }
        }

        function processMissedNote() {
            if (state.streak > 5) {
                state.shake = 15;
                showFeedback('MISS', '#ef4444');
                triggerShoutout("COMBO BROKEN", 0.5);
            } else {
                showFeedback('MISS', '#ef4444');
            }

            state.lives--;
            animateLifeLoss();
            state.shake = 20;

            if (state.isFeverActive) {
                state.isFeverActive = false;
                feverFill.classList.remove('overdrive-active');
                triggerShoutout("OVERDRIVE FAILED!", 0.5);
            }

            if (audioEngine) audioEngine.sfxLifeLost();
            state.streak = 0;
            state.fever = 0;

            notes.forEach(n => {
                for (let i = 0; i < 8; i++) particles.push(new Particle(n.x, n.y, n.color, true));
            });
            notes = [];

            updateUI();

            if (state.lives <= 0) endGame();
        }

        function checkLevelUp() {
            state.level++;
            state.shake = 25;
            triggerShoutout(`LEVEL ${state.level}!`, 1.5);

            if (state.level > 4 && audioEngine) audioEngine.evolveSong();
            if (audioEngine) audioEngine.sfxLevelUp();

            updateUI();
        }

        function activateFever() {
            if (state.fever < 100 || state.isFeverActive) return;
            
            state.isFeverActive = true;
            state.feverMeasures = 0;
            state.shake = 35;
            state.fever = 100;
            feverFill.style.background = 'linear-gradient(90deg, #ec4899, #a855f7)';

            if (audioEngine) audioEngine.sfxFever();
            triggerShoutout("OVERDRIVE! SURVIVE!", 2.0);
            feverFill.classList.add('overdrive-active');
            updateUI();
        }

        function showFeedback(text, color = '#fff') {
            feedbackText.innerText = text;
            feedbackText.style.color = color;
            feedbackText.style.transform = 'scale(1.3) rotate(' + (Math.random() * 10 - 5) + 'deg)';
            setTimeout(() => {
                feedbackText.style.transform = 'scale(0)';
            }, 250);
        }

        function getRetroHeart() {
            return `<svg class="w-12 h-12" viewBox="0 0 11 11" style="shape-rendering: crispEdges; fill: currentColor;">
            <rect x="2" y="1" width="2" height="1"/>
            <rect x="7" y="1" width="2" height="1"/>
            <rect x="1" y="2" width="4" height="1"/>
            <rect x="6" y="2" width="4" height="1"/>
            <rect x="0" y="3" width="11" height="3"/>
            <rect x="1" y="6" width="9" height="1"/>
            <rect x="2" y="7" width="7" height="1"/>
            <rect x="3" y="8" width="5" height="1"/>
            <rect x="4" y="9" width="3" height="1"/>
            <rect x="5" y="10" width="1" height="1"/>
        </svg>`;
        }

        function animateLifeLoss() {
            const display = document.getElementById('life-loss-display');
            const container = document.getElementById('hearts-container');

            let html = '';
            for (let i = 0; i < state.lives; i++) {
                html += `<span class="inline-block">${getRetroHeart()}</span>`;
            }
            html += `<span class="heart-shatter">${getRetroHeart()}</span>`;

            container.innerHTML = html;
            display.style.opacity = '1';
            display.style.transform = 'scale(1.2)';

            setTimeout(() => {
                display.style.opacity = '0';
                display.style.transform = 'scale(1)';
            }, 1200);
        }

        function updateUI() {
            scoreEl.innerText = state.score.toString().padStart(5, '0');
            streakEl.innerText = state.streak;
            levelEl.innerText = state.level;
            feverFill.style.width = state.fever + '%';
        }

        async function startGame() {
            cancelAnimationFrame(menuAnimId);

            if (!audioEngine) audioEngine = new AudioEngine();
            await audioEngine.start();

            state = {
                score: 0,
                level: 1,
                streak: 0,
                maxStreak: 0,
                fever: 0,
                lives: 5,
                isFeverActive: false,
                feverMeasures: 0,
                gameActive: true,
                lastFrame: performance.now(),
                shake: 0,
                beatPulse: 0,
                totalMeasures: 0,
                notesSpawned: 0,
                nextBugAt: Math.floor(Math.random() * 11) + 10
            };
            notes = [];
            particles = [];
            lanePulses = [0, 0, 0, 0];
            feverFill.style.background = 'linear-gradient(90deg, #ec4899, #a855f7)';
            feverFill.classList.remove('overdrive-active');

            menu.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            triggerShoutout("GET READY!", 1.0);
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            state.gameActive = false;
            if (audioEngine) {
                audioEngine.stop();
                audioEngine.sfxGameOver();
            }

            gameOverScreen.classList.remove('hidden');
            gameOverScreen.classList.add('flex');
            document.getElementById('final-score').innerText = state.score;
            document.getElementById('final-streak').innerText = state.maxStreak;
            document.getElementById('final-level').innerText = state.level;
        }

        function gameLoop(now) {
            if (!state.gameActive) return;
            const dt = (now - state.lastFrame) / 1000;
            state.lastFrame = now;

            update(dt);
            draw();

            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            if (state.shake > 0) state.shake -= dt * 50;
            if (state.beatPulse > 0) state.beatPulse -= dt * 4;

            if (audioEngine && audioEngine.kickTimes.length > 0) {
                while (audioEngine.kickTimes.length > 0 && Tone.now() >= audioEngine.kickTimes[0]) {
                    state.beatPulse = 1.0;
                    audioEngine.kickTimes.shift();
                }
            }

            for (let i = 0; i < lanePulses.length; i++) {
                if (lanePulses[i] > 0) lanePulses[i] -= dt * 4;
            }

            for (let i = notes.length - 1; i >= 0; i--) {
                let n = notes[i];
                if (!n) continue;

                n.update(dt);

                if (Tone.now() > n.targetTime + config.hitRange) {
                    if (!n.hit) {
                        if (!n.isBug) {
                            processMissedNote();
                            break;
                        } else {
                            notes.splice(i, 1);
                        }
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(dt);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);

            bgGrad.addColorStop(0, '#0f172a');
            bgGrad.addColorStop(1, state.isFeverActive ? '#4c1d95' : '#1e1b4b');

            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if (state.shake > 0) {
                ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
            }

            ctx.save();
            if (state.beatPulse > 0) {
                const pulseScale = 1 + (state.beatPulse * 0.03);
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(pulseScale, pulseScale);
                ctx.translate(-canvas.width / 2, -canvas.height / 2);
            }

            // Radial Blur / Ghosting effect during Overdrive
            if (state.isFeverActive) {
                ctx.globalAlpha = 0.3;
                for (let i = 1; i <= 3; i++) {
                    const offset = i * Math.sin(performance.now() / 100) * 5;
                    ctx.drawImage(canvas, offset, offset);
                }
                ctx.globalAlpha = 1.0;
            }

            const time = performance.now() / 1000;
            const speed = 100 * (1 + (state.level * 0.2));
            const gridY = (time * speed) % 80;

            let gridColor = state.isFeverActive ? 'rgba(168, 85, 247, 0.3)' : 'rgba(236, 72, 153, 0.15)';

            if (state.beatPulse > 0.1) {
                ctx.shadowBlur = state.beatPulse * 15;
                ctx.shadowColor = gridColor.replace(/[\d.]+\)$/g, '1)');
            }

            ctx.strokeStyle = gridColor;
            ctx.lineWidth = (1 + (state.level * 0.2)) * (1 + (state.beatPulse * 0.5));
            ctx.beginPath();
            for (let y = gridY; y < canvas.height; y += 80) {
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
            }
            const centerX = canvas.width / 2;
            for (let i = -5; i <= 5; i++) {
                ctx.moveTo(centerX + i * 60, 0);
                ctx.lineTo(centerX + i * 200, canvas.height);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;

            ctx.restore();

            const renderWidth = Math.min(window.innerWidth * 0.9, 450);
            const laneWidth = renderWidth / config.laneCount;

            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 2;
            lanes.forEach((x, i) => {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();

                if (lanePulses[i] > 0) {
                    const pulseGrad = ctx.createLinearGradient(0, config.targetY, 0, 0);
                    const color = state.isFeverActive ? '168, 85, 247' : '236, 72, 153';
                    pulseGrad.addColorStop(0, `rgba(${color}, ${lanePulses[i] * 0.5})`);
                    pulseGrad.addColorStop(1, `rgba(${color}, 0)`);
                    ctx.fillStyle = pulseGrad;
                    ctx.fillRect(x - laneWidth / 2, 0, laneWidth, canvas.height);
                }
            });

            ctx.fillStyle = state.isFeverActive ? 'rgba(168, 85, 247, 0.2)' : 'rgba(255,255,255,0.05)';
            ctx.beginPath();
            const startX = lanes[0] - (laneWidth / 2) + 10;
            ctx.roundRect(startX, config.targetY - 20, renderWidth - 20, 40, 10);
            ctx.fill();
            ctx.shadowBlur = 15;
            ctx.shadowColor = state.isFeverActive ? '#a855f7' : '#ec4899';
            ctx.strokeStyle = state.isFeverActive ? '#a855f7' : 'rgba(236, 72, 153, 0.8)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 0;

            notes.forEach(note => note.draw());
            particles.forEach(p => p.draw());

            ctx.restore();
        }

        let lastTapTime = 0;
        function handleTap(laneIndex) {
            if (!audioEngine) return;
            
            // Manual Overdrive Activation: Double tap
            const now = performance.now();
            let silentHit = false;
            if (now - lastTapTime < 250 && state.fever >= 100 && !state.isFeverActive) {
                activateFever();
                silentHit = true; // Don't penalize if this second tap doesn't hit a note
            }
            lastTapTime = now;

            lanePulses[laneIndex] = 1.0;
            triggerHit(laneIndex, silentHit);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (state.fever >= 100 && !state.isFeverActive) {
                    activateFever();
                    // Also try to hit the nearest note so activation doesn't skip it
                    const nextNote = notes.find(n => !n.hit && !n.isBug);
                    if (nextNote) triggerHit(nextNote.lane, true);
                } else {
                    const nextNote = notes.find(n => !n.hit && !n.isBug);
                    const lane = nextNote ? nextNote.lane : Math.floor(Math.random() * config.laneCount);
                    handleTap(lane);
                }
            }
            if (['Digit1', 'Digit2', 'Digit3', 'Digit4'].includes(e.code)) {
                const lane = parseInt(e.key) - 1;
                handleTap(lane);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const renderWidth = Math.min(rect.width * 0.9, 450);
            const offsetX = (rect.width - renderWidth) / 2;
            const laneWidth = renderWidth / config.laneCount;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touchX = e.changedTouches[i].clientX - rect.left - offsetX;
                const laneIndex = Math.floor(touchX / laneWidth);
                if (laneIndex >= 0 && laneIndex < config.laneCount) {
                    handleTap(laneIndex);
                }
            }
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const renderWidth = Math.min(rect.width * 0.9, 450);
            const offsetX = (rect.width - renderWidth) / 2;
            const laneWidth = renderWidth / config.laneCount;

            const mouseX = e.clientX - rect.left - offsetX;
            const laneIndex = Math.floor(mouseX / laneWidth);
            if (laneIndex >= 0 && laneIndex < config.laneCount) {
                handleTap(laneIndex);
            }
        });

        function handleRelease(laneIndex) {
            const activeHold = notes.find(n => n.lane === laneIndex && n.isHold && n.isTracking);
            if (activeHold) {
                const now = Tone.now();
                const holdEndTime = activeHold.targetTime + activeHold.duration;
                
                // Allow a small leniency for early release (0.1s)
                if (now < holdEndTime - 0.1) {
                    activeHold.isTracking = false;
                    showFeedback('INCOMPLETE', '#ef4444');
                    if (audioEngine) audioEngine.sfxLifeLost();
                    state.streak = 0;
                    updateUI();
                    
                    // Note remains but stops tracking, will eventually be missed/removed
                }
            }
        }

    </script>
</body>
